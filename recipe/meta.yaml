{% set name = "pandas-summary" %}
{% set version = "0.0.41" %}
{% set sha256 = "4bf4563f9b5ca284ab308f43e1ede7bf4f66a47ebeb8585212ea48f525fcac0a" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  fn: {{ name }}-{{ version }}.tar.gz
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  noarch: python
  number: 2
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools

  run:
    - python >={{ python_min }}
    - numpy
    - pandas

test:
  imports:
    - pandas_summary

  requires:
    - pytest
    - python {{ python_min }}

about:
  home: https://github.com/mouradmourafiq/pandas-summary
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: 'An extension to pandas describe function.'
  dev_url: https://github.com/mouradmourafiq/pandas-summary

extra:
  recipe-maintainers:
    - proinsias
